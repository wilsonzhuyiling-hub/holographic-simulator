name: backend-tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff (non-blocking)
        working-directory: backend
        run: ruff check . || true
        # Non-blocking during Stage 0 — universe_simulator.py is legacy code.
        # Will be enforced (remove || true) once Stage 1 refactor is complete.

      - name: Run tests
        working-directory: backend
        run: pytest --tb=short
